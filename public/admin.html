<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | Florăria Mihai</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script>
  if (localStorage.getItem("diaflowersAdmin") !== "true") {
    window.location.href = "login.html";
  }
</script>
  <header class="admin-header">
    <div class="logo">🌸 Admin Florărie</div>
    <a href="index.html">Înapoi la magazin</a>
    <button onclick="logoutAdmin()">Logout</button>
  </header>
  <main class="admin-layout">
    <section class="admin-stats">
  <div class="stat-card">
    <span>Comenzi totale</span>
    <strong id="totalOrders">0</strong>
  </div>

  <div class="stat-card">
    <span>Comenzi noi</span>
    <strong id="newOrders">0</strong>
  </div>

  <div class="stat-card">
    <span>Vânzări totale</span>
    <strong id="totalSales">0 lei</strong>
  </div>
  <div class="stat-card">
  <span>Comenzi azi</span>
  <strong id="todayOrders">0</strong>
</div>

<div class="stat-card">
  <span>Vânzări azi</span>
  <strong id="todaySales">0 lei</strong>
</div>
</section>
    <section class="panel">
      <h2>Adaugă produs</h2>
      <form id="productForm" class="admin-form">
        <input name="name" placeholder="Nume produs" required />
        <input name="category" placeholder="Categorie" required />
        <input name="price" type="number" placeholder="Preț" required />
        <input name="stock" type="number" placeholder="Stoc" value="1" />
        <input name="imageFile" type="file" accept="image/*" multiple />
        <textarea name="description" placeholder="Descriere"></textarea>
        <button>Salvează produs</button>
      </form>
    </section>
    <section class="panel">
      <h2>Produse</h2>
      <div id="adminProducts"></div>
    </section>
    <section class="panel orders-panel">
      <h2>Comenzi</h2>
      <input
  id="orderSearch"
  type="text"
  placeholder="Caută după nume, telefon sau status..."
  class="search-input"
/>
<button id="exportOrdersBtn" class="export-btn">
  📊 Exportă comenzi CSV
</button>
      <div id="ordersList"></div>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
